<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ussly · IG Post 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,144,700,50,1;1,144,700,100,1&family=Geist+Mono:wght@500&family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F1E8;
    --ink: #141414;
    --ink-muted: #5C544A;
    --rule: #D8CFBC;
    --accent: #C8501E;
  }
  html, body { margin: 0; padding: 0; background: #000; }
  body {
    width: 1080px; height: 1350px;
    font-family: 'Geist', system-ui, sans-serif;
  }
  .canvas {
    position: relative;
    width: 1080px; height: 1350px;
    background: var(--paper);
    overflow: hidden;
    padding: 80px;
    box-sizing: border-box;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .canvas::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.05; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  header, footer { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-start; }
  .kicker {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .kicker .ac { color: var(--accent); }

  .star {
    width: 56px; height: 56px;
    color: var(--accent);
  }

  main {
    position: relative; z-index: 2;
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    margin-top: -40px;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 168px;
    line-height: 0.92;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 0 0 56px 0;
    font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 1;
  }
  h1 .it {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  }
  p.lede {
    font-family: 'Geist', sans-serif;
    font-size: 30px;
    line-height: 1.45;
    color: var(--ink-muted);
    max-width: 720px;
    margin: 0;
  }
  p.lede .em {
    color: var(--ink);
    font-weight: 500;
    background-image: linear-gradient(transparent 62%, rgba(200,80,30,0.28) 62%, rgba(200,80,30,0.28) 88%, transparent 88%);
    padding: 0 0.08em;
  }

  .dotted {
    height: 2px;
    background-image: radial-gradient(circle, var(--ink-muted) 1px, transparent 1.4px);
    background-size: 8px 2px;
    background-repeat: repeat-x;
    margin-bottom: 28px;
  }

  footer .right { text-align: right; }
</style>
</head>
<body>
  <div class="canvas">
    <header>
      <div class="kicker"><span class="ac">/</span>&nbsp;&nbsp;Now Introducing</div>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0 L13.6 9.3 22.8 7.6 16 14.4 22.8 21.2 13.6 19.5 12 28.8 10.4 19.5 1.2 21.2 8 14.4 1.2 7.6 10.4 9.3 Z" transform="translate(0 -2)"/>
      </svg>
    </header>

    <main>
      <h1>Hello,<br/>we&rsquo;re&nbsp;<span class="it">Uss<span style="font-style:italic">ly.</span></span></h1>
      <p class="lede">A small, independent studio designing
        websites for <span class="em">restaurants, barbers,
        and businesses with a point of view</span>.
        Real craft, no shortcuts.</p>
    </main>

    <footer>
      <div>
        <div class="dotted" style="width:340px"></div>
        <div class="kicker">ussly.design</div>
      </div>
      <div class="right">
        <div class="dotted" style="width:340px"></div>
        <div class="kicker"><span class="ac">@</span>usslydesignss</div>
      </div>
    </footer>
  </div>
</body>
</html>
