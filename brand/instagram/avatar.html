<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ussly · IG Avatar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,144,700,50,1;1,144,700,100,1&family=Geist+Mono:wght@500&family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F1E8;
    --paper-deep: #EDE6D6;
    --ink: #141414;
    --ink-muted: #5C544A;
    --rule: #D8CFBC;
    --accent: #C8501E;
    --accent-deep: #9A3D14;
    --cream: #FBF8F1;
  }
  html, body { margin: 0; padding: 0; background: #000; }
  body {
    width: 1080px; height: 1080px;
    display: grid; place-items: center;
    font-family: 'Geist', system-ui, sans-serif;
  }
  .canvas {
    position: relative;
    width: 1080px; height: 1080px;
    background: var(--paper);
    overflow: hidden;
  }
  .frame {
    position: absolute; inset: 56px;
    border: 2px solid var(--ink);
  }
  .grain::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.06; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .kicker {
    position: absolute;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .kicker.tl { top: 96px; left: 96px; }
  .kicker.tr { top: 96px; right: 96px; text-align: right; }
  .kicker.bl { bottom: 96px; left: 96px; }
  .kicker.br { bottom: 96px; right: 96px; text-align: right; color: var(--accent); }

  .mark {
    position: absolute;
    inset: 0;
    display: grid; place-items: center;
    white-space: nowrap;
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 700;
    font-size: 560px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.06em;
    text-align: center;
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
    transform: translateY(-30px);
  }
  .mark .inner { display: inline-flex; align-items: baseline; gap: 0; }
  .dot {
    color: var(--ink);
    font-style: normal;
    font-size: 0.5em;
    line-height: 1;
    margin-left: -0.04em;
  }

  .wordmark {
    position: absolute;
    bottom: 168px; left: 0; right: 0;
    text-align: center;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 26px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .rule {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 226px;
    width: 64px; height: 2px;
    background-image: radial-gradient(circle, var(--ink) 1px, transparent 1.4px);
    background-size: 8px 2px;
    background-repeat: repeat-x;
  }
</style>
</head>
<body>
  <div class="canvas grain">
    <div class="frame"></div>
    <div class="kicker tl">/ Studio</div>
    <div class="kicker tr">Est&nbsp;·&nbsp;2024</div>
    <div class="mark"><span class="inner"><span>U</span><span class="dot">.</span></span></div>
    <div class="rule"></div>
    <div class="wordmark">U&nbsp;S&nbsp;S&nbsp;L&nbsp;Y</div>
    <div class="kicker bl">ussly.design</div>
    <div class="kicker br">@usslydesignss</div>
  </div>
</body>
</html>
