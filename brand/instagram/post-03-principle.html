<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ussly · IG Post 03</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,144,700,50,1;1,144,700,100,1&family=Geist+Mono:wght@500&family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F1E8;
    --ink: #141414;
    --ink-2: #1a1a1a;
    --paper-muted: #B9B0A0;
    --accent: #E36A2C;
    --accent-soft: #C8501E;
  }
  html, body { margin: 0; padding: 0; background: #000; }
  body { width: 1080px; height: 1350px; font-family: 'Geist', system-ui, sans-serif; }
  .canvas {
    position: relative;
    width: 1080px; height: 1350px;
    background:
      radial-gradient(ellipse 900px 700px at 80% -10%, rgba(227,106,44,0.18), transparent 60%),
      radial-gradient(ellipse 700px 700px at 0% 110%, rgba(227,106,44,0.10), transparent 60%),
      var(--ink-2);
    overflow: hidden;
    padding: 80px;
    box-sizing: border-box;
    display: flex; flex-direction: column;
    justify-content: space-between;
    color: var(--paper);
  }
  .canvas::after {
    content: ""; position: absolute; inset: 0;
    pointer-events: none; opacity: 0.08; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  header, footer { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }

  .kicker {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--paper-muted);
  }
  .kicker .ac { color: var(--accent); }

  .openq {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 700;
    font-size: 220px;
    line-height: 0.7;
    color: var(--accent);
    margin: -40px 0 -20px -20px;
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  }

  main { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 138px;
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: var(--paper);
    margin: 0;
    font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 1;
  }
  h1 .it {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  }
  h1 .underline {
    background-image: linear-gradient(transparent 72%, rgba(227,106,44,0.45) 72%, rgba(227,106,44,0.45) 92%, transparent 92%);
    padding: 0 0.06em;
  }

  .attribution {
    margin-top: 56px;
    display: flex; align-items: center; gap: 20px;
  }
  .em-rule {
    width: 60px; height: 2px;
    background: var(--accent);
  }
  .attribution .name {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper-muted);
  }
  .attribution .name .ac { color: var(--accent); }

  .dotted {
    height: 2px;
    background-image: radial-gradient(circle, var(--paper-muted) 1px, transparent 1.4px);
    background-size: 8px 2px;
    background-repeat: repeat-x;
    width: 340px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <header>
      <div class="kicker"><span class="ac">/</span>&nbsp;&nbsp;Principle&nbsp;&nbsp;<span class="ac">·</span>&nbsp;&nbsp;02</div>
      <div class="kicker">Ussly&nbsp;·&nbsp;Studio</div>
    </header>

    <main>
      <div class="openq">&ldquo;</div>
      <h1>Sites that <span class="it">don&rsquo;t</span><br/>look like<br/><span class="underline">everyone&nbsp;else&rsquo;s.</span></h1>
      <div class="attribution">
        <span class="em-rule"></span>
        <span class="name">Ussly&nbsp;&nbsp;<span class="ac">·</span>&nbsp;&nbsp;Manifesto</span>
      </div>
    </main>

    <footer>
      <div>
        <div class="dotted"></div>
        <div class="kicker" style="margin-top:14px">ussly.design</div>
      </div>
      <div style="text-align:right">
        <div class="dotted" style="margin-left:auto"></div>
        <div class="kicker" style="margin-top:14px"><span class="ac">@</span>usslydesignss</div>
      </div>
    </footer>
  </div>
</body>
</html>
